<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASCII Table</title>
<style>
  :root{
    --bg: #0b0f0d;
    --panel: #101613;
    --line: #23302a;
    --text: #d7e4dc;
    --dim: #7a9188;
    --accent: #5ffbb0;
    --accent-dim: #2b6b4f;
    --row-alt: #0e1512;
    --mono: "IBM Plex Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--mono);
    -webkit-font-smoothing:antialiased;
  }
  body{
    padding:32px 20px 60px;
  }
  .wrap{
    max-width:1680px;
    margin:0 auto;
  }
  .crt-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    border-bottom:1px solid var(--line);
    padding-bottom:16px;
    margin-bottom:20px;
  }
  .title{
    font-size:20px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text);
  }
  .title .blink{
    color:var(--accent);
    animation:blink 1.1s steps(1) infinite;
  }
  @keyframes blink{
    50%{opacity:0;}
  }
  .subtitle{
    color:var(--dim);
    font-size:12px;
  }
  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px 18px;
    align-items:center;
    margin-bottom:18px;
    padding:14px 16px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:2px;
  }
  .controls .group-label{
    color:var(--dim);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    margin-right:4px;
  }
  .toggle{
    display:inline-flex;
    align-items:center;
    gap:7px;
    cursor:pointer;
    user-select:none;
    padding:6px 10px;
    border:1px solid var(--line);
    border-radius:2px;
    color:var(--dim);
    font-size:12px;
    letter-spacing:0.05em;
    transition:border-color .15s ease, color .15s ease, background .15s ease;
  }
  .toggle:hover{
    border-color:var(--accent-dim);
  }
  .toggle input{
    appearance:none;
    width:10px;height:10px;
    border:1px solid var(--dim);
    background:transparent;
    display:inline-block;
    position:relative;
    margin:0;
    cursor:pointer;
  }
  .toggle input:checked{
    background:var(--accent);
    border-color:var(--accent);
    box-shadow:0 0 6px var(--accent);
  }
  .toggle.active{
    color:var(--accent);
    border-color:var(--accent-dim);
    background:rgba(95,251,176,0.05);
  }
  .search-box{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .rows-input{
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--accent);
    font-family:var(--mono);
    font-size:13px;
    padding:6px 8px;
    width:56px;
    border-radius:2px;
  }
  .rows-input:focus{
    outline:none;
    border-color:var(--accent-dim);
  }
  .table-only{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .search-box label{
    color:var(--dim);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
  }
  .search-box input[type="text"]{
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--accent);
    font-family:var(--mono);
    font-size:13px;
    padding:6px 8px;
    width:130px;
    border-radius:2px;
  }
  .search-box input[type="text"]:focus{
    outline:none;
    border-color:var(--accent-dim);
  }
  .mode-tabs, .range-tabs{
    display:flex;
    gap:6px;
    margin-bottom:14px;
  }
  .mode-tabs button, .range-tabs button{
    background:transparent;
    border:1px solid var(--line);
    color:var(--dim);
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:6px 12px;
    cursor:pointer;
    border-radius:2px;
    transition:all .15s ease;
  }
  .mode-tabs button:hover, .range-tabs button:hover{
    color:var(--text);
  }
  .mode-tabs button.active, .range-tabs button.active{
    color:var(--bg);
    background:var(--accent);
    border-color:var(--accent);
  }
  .mode-tabs button{
    font-size:12px;
    padding:8px 16px;
  }
  .converter-input-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
  }
  .converter-input-wrap label{
    color:var(--dim);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
  }
  #converter-text{
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--accent);
    font-family:var(--mono);
    font-size:15px;
    padding:10px 14px;
    border-radius:2px;
  }
  #converter-text:focus{
    outline:none;
    border-color:var(--accent-dim);
  }
  .separator-options{
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:18px;
  }
  .separator-options button{
    background:transparent;
    border:1px solid var(--line);
    color:var(--dim);
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:6px 12px;
    cursor:pointer;
    border-radius:2px;
    transition:all .15s ease;
  }
  .separator-options button:hover{
    color:var(--text);
  }
  .separator-options button.active{
    color:var(--bg);
    background:var(--accent);
    border-color:var(--accent);
  }
  .readout{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:2px;
    padding:12px 14px;
    margin-bottom:10px;
  }
  .readout-label{
    color:var(--accent);
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    width:42px;
    flex-shrink:0;
  }
  .readout-value{
    flex:1;
    color:var(--text);
    font-size:14px;
    word-break:break-all;
    line-height:1.5;
  }
  .copy-btn{
    flex-shrink:0;
    background:transparent;
    border:1px solid var(--line);
    color:var(--dim);
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:6px 12px;
    border-radius:2px;
    cursor:pointer;
    transition:all .15s ease;
    width:72px;
  }
  .copy-btn:hover{
    color:var(--accent);
    border-color:var(--accent-dim);
  }
  .tables-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(110px, 1fr));
    gap:0;
    border:1px solid var(--line);
    border-top:none;
  }
  .tables-grid table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
  }
  .tables-grid table + table{
    border-left:1px solid var(--line);
  }
  thead th{
    text-align:left;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--accent);
    background:#0d1310;
    padding:8px 10px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
  }
  tbody td{
    padding:5px 10px;
    font-size:12.5px;
    border-bottom:1px solid var(--line);
    color:var(--text);
    white-space:nowrap;
  }
  tbody tr:nth-child(even){
    background:var(--row-alt);
  }
  tbody tr:hover{
    background:rgba(95,251,176,0.06);
  }
  td.char-cell{
    color:var(--accent);
    font-size:14px;
    width:1%;
  }
  td.dim-cell{
    color:var(--dim);
  }
  .no-results{
    text-align:center;
    color:var(--dim);
    padding:24px;
    grid-column:1 / -1;
  }
  footer{
    margin-top:18px;
    color:var(--dim);
    font-size:11px;
    letter-spacing:0.05em;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="crt-header">
    <div>
      <div class="title">ASCII<span class="blink">_</span>TABLE</div>
      <div class="subtitle">128 character reference &middot; codes 0&ndash;127</div>
    </div>
  </div>

  <div class="mode-tabs" id="mode-tabs">
    <button class="active" data-mode="table">Table</button>
    <button data-mode="converter">Converter</button>
  </div>

  <div class="controls">
    <span class="group-label">Columns</span>
    <label class="toggle active" id="toggle-dec">
      <input type="checkbox" data-col="dec" checked>
      <span>DEC</span>
    </label>
    <label class="toggle active" id="toggle-hex">
      <input type="checkbox" data-col="hex" checked>
      <span>HEX</span>
    </label>
    <label class="toggle active" id="toggle-bin">
      <input type="checkbox" data-col="bin" checked>
      <span>BIN</span>
    </label>
    <label class="toggle" id="toggle-oct">
      <input type="checkbox" data-col="oct">
      <span>OCT</span>
    </label>

    <div class="table-only" id="rows-group">
      <span class="group-label" style="margin-left:8px;">Rows/block</span>
      <input type="number" id="rows-input" min="1" max="128" value="32" class="rows-input">
    </div>

    <div class="search-box table-only" id="search-group">
      <label for="search">Find</label>
      <input type="text" id="search" placeholder="char, name, code&hellip;">
    </div>
  </div>

  <div id="table-view">
    <div class="range-tabs" id="range-tabs">
      <button class="active" data-range="all">All</button>
      <button data-range="control">Control (0&ndash;31)</button>
      <button data-range="printable">Printable (32&ndash;126)</button>
      <button data-range="digits">Digits</button>
      <button data-range="letters">Letters</button>
      <button data-range="symbols">Symbols</button>
    </div>

    <div class="tables-grid" id="tables-grid"></div>

    <footer>
      <span>Click a column label to toggle it. Rows split into blocks to fit the screen at once.</span>
      <span id="count-label"></span>
    </footer>
  </div>

  <div id="converter-view" style="display:none;">
    <div class="converter-input-wrap">
      <label for="converter-text">Type text</label>
      <input type="text" id="converter-text" placeholder="Type something to see its codes&hellip;" autocomplete="off">
    </div>
    <div class="separator-options" id="separator-options">
      <span class="group-label">Separator</span>
      <button class="active" data-sep="space">Space</button>
      <button data-sep="comma">Comma</button>
    </div>
    <div id="converter-grid"></div>
  </div>

</div>

<script>
  const controlNames = [
    "NUL (null)", "SOH (start of heading)", "STX (start of text)", "ETX (end of text)",
    "EOT (end of transmission)", "ENQ (enquiry)", "ACK (acknowledge)", "BEL (bell)",
    "BS (backspace)", "TAB (horizontal tab)", "LF (line feed)", "VT (vertical tab)",
    "FF (form feed)", "CR (carriage return)", "SO (shift out)", "SI (shift in)",
    "DLE (data link escape)", "DC1 (device control 1)", "DC2 (device control 2)",
    "DC3 (device control 3)", "DC4 (device control 4)", "NAK (negative acknowledge)",
    "SYN (synchronous idle)", "ETB (end of trans. block)", "CAN (cancel)",
    "EM (end of medium)", "SUB (substitute)", "ESC (escape)",
    "FS (file separator)", "GS (group separator)", "RS (record separator)",
    "US (unit separator)"
  ];

  function nameFor(code){
    if(code < 32) return controlNames[code];
    if(code === 32) return "SPACE";
    if(code === 127) return "DEL (delete)";
    return "Printable character";
  }

  function categoryFor(code){
    if(code < 32 || code === 127) return "control";
    if(code === 32) return "symbols";
    if(code >= 48 && code <= 57) return "digits";
    if((code >= 65 && code <= 90) || (code >= 97 && code <= 122)) return "letters";
    return "symbols";
  }

  const data = [];
  for(let code = 0; code <= 127; code++){
    data.push({
      code,
      char: code < 32 || code === 127 ? "\u2022" : String.fromCharCode(code),
      displayChar: code === 32 ? "SP" : (code < 32 || code === 127 ? controlNames[code < 32 ? code : 31].split(" ")[0] : String.fromCharCode(code)),
      dec: code,
      hex: "0x" + code.toString(16).toUpperCase().padStart(2, "0"),
      oct: "0o" + code.toString(8).padStart(3, "0"),
      bin: code.toString(2).padStart(8, "0"),
      name: nameFor(code),
      category: categoryFor(code)
    });
  }

  const tablesGrid = document.getElementById("tables-grid");
  const searchInput = document.getElementById("search");
  const rangeTabs = document.getElementById("range-tabs");
  const countLabel = document.getElementById("count-label");
  const rowsInput = document.getElementById("rows-input");
  const modeTabs = document.getElementById("mode-tabs");
  const tableView = document.getElementById("table-view");
  const converterView = document.getElementById("converter-view");
  const converterInput = document.getElementById("converter-text");
  const converterGrid = document.getElementById("converter-grid");
  const separatorOptions = document.getElementById("separator-options");

  let activeMode = "table";
  let separator = " ";

  let activeRange = "all";
  let activeCols = { dec: true, hex: true, oct: false, bin: true };

  // Rows per column-block. Smaller rows-per-block => shorter blocks that fit vertically on one screen.
  let ROWS_PER_BLOCK = parseInt(rowsInput.value, 10) || 32;

  function inRange(row){
    switch(activeRange){
      case "control": return row.category === "control";
      case "printable": return row.code >= 32 && row.code <= 126;
      case "digits": return row.category === "digits";
      case "letters": return row.category === "letters";
      case "symbols": return row.category === "symbols" && row.code !== 32 || (row.code === 32 && activeRange === "symbols");
      default: return true;
    }
  }

  function matchesSearch(row, q){
    if(!q) return true;
    q = q.toLowerCase();
    return (
      row.char.toLowerCase() === q ||
      row.displayChar.toLowerCase().includes(q) ||
      row.name.toLowerCase().includes(q) ||
      String(row.dec).includes(q) ||
      row.hex.toLowerCase().includes(q) ||
      row.oct.toLowerCase().includes(q) ||
      row.bin.includes(q)
    );
  }

  function headerHtml(){
    let html = "<tr><th>Char</th>";
    if(activeCols.dec) html += "<th>Dec</th>";
    if(activeCols.hex) html += "<th>Hex</th>";
    if(activeCols.oct) html += "<th>Oct</th>";
    if(activeCols.bin) html += "<th>Bin</th>";
    html += "</tr>";
    return html;
  }

  function rowHtml(row){
    let html = `<td class="char-cell">${escapeHtml(row.displayChar)}</td>`;
    if(activeCols.dec) html += `<td>${row.dec}</td>`;
    if(activeCols.hex) html += `<td>${row.hex}</td>`;
    if(activeCols.oct) html += `<td>${row.oct}</td>`;
    if(activeCols.bin) html += `<td class="dim-cell">${row.bin}</td>`;
    return `<tr>${html}</tr>`;
  }

  function render(){
    const q = searchInput.value.trim();
    const rows = data.filter(r => inRange(r) && matchesSearch(r, q));

    tablesGrid.innerHTML = "";

    if(rows.length === 0){
      tablesGrid.innerHTML = `<div class="no-results">No matching characters</div>`;
      countLabel.textContent = `0 of ${data.length} codes shown`;
      return;
    }

    const blockCount = Math.max(1, Math.ceil(rows.length / ROWS_PER_BLOCK));
    const perBlock = Math.ceil(rows.length / blockCount);

    for(let i = 0; i < rows.length; i += perBlock){
      const slice = rows.slice(i, i + perBlock);
      const table = document.createElement("table");
      table.innerHTML = `<thead>${headerHtml()}</thead><tbody>${slice.map(rowHtml).join("")}</tbody>`;
      tablesGrid.appendChild(table);
    }

    countLabel.textContent = `${rows.length} of ${data.length} codes shown`;
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function displayCharFor(code){
    if(code === 32) return "SP";
    if(code < 32) return controlNames[code].split(" ")[0];
    if(code === 127) return "DEL";
    return String.fromCodePoint(code);
  }

  function codeInfo(code){
    return {
      code,
      displayChar: displayCharFor(code),
      dec: code,
      hex: "0x" + code.toString(16).toUpperCase().padStart(2, "0"),
      oct: "0o" + code.toString(8).padStart(3, "0"),
      bin: code.toString(2).padStart(8, "0")
    };
  }

  function renderConverter(){
    const text = converterInput.value;
    const chars = Array.from(text);

    converterGrid.innerHTML = "";

    if(chars.length === 0){
      converterGrid.innerHTML = `<div class="no-results">Type something above to see its character codes</div>`;
      return;
    }

    const rows = chars.map(ch => codeInfo(ch.codePointAt(0)));
    const groups = [
      { key: "dec", label: "DEC" },
      { key: "hex", label: "HEX" },
      { key: "oct", label: "OCT" },
      { key: "bin", label: "BIN" }
    ];

    let anyShown = false;

    groups.forEach(g => {
      if(!activeCols[g.key]) return;
      anyShown = true;
      const joined = rows.map(r => String(r[g.key])).join(separator);

      const box = document.createElement("div");
      box.className = "readout";

      const labelEl = document.createElement("div");
      labelEl.className = "readout-label";
      labelEl.textContent = g.label;

      const valueEl = document.createElement("div");
      valueEl.className = "readout-value";
      valueEl.textContent = joined;

      const btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.textContent = "Copy";
      btn.addEventListener("click", () => {
        navigator.clipboard.writeText(joined).then(() => {
          btn.textContent = "Copied!";
          setTimeout(() => { btn.textContent = "Copy"; }, 1200);
        });
      });

      box.appendChild(labelEl);
      box.appendChild(valueEl);
      box.appendChild(btn);
      converterGrid.appendChild(box);
    });

    if(!anyShown){
      converterGrid.innerHTML = `<div class="no-results">Turn on at least one column above to see a readout</div>`;
    }
  }

  // separator toggle
  separatorOptions.addEventListener("click", e => {
    const btn = e.target.closest("button");
    if(!btn) return;
    separatorOptions.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    separator = btn.dataset.sep === "comma" ? ", " : " ";
    renderConverter();
  });

  // mode tabs
  modeTabs.addEventListener("click", e => {
    const btn = e.target.closest("button");
    if(!btn) return;
    modeTabs.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeMode = btn.dataset.mode;

    const isTable = activeMode === "table";
    tableView.style.display = isTable ? "" : "none";
    converterView.style.display = isTable ? "none" : "";
    document.querySelectorAll(".table-only").forEach(el => {
      el.style.display = isTable ? "" : "none";
    });

    if(!isTable) renderConverter();
  });

  converterInput.addEventListener("input", renderConverter);

  // column toggles
  document.querySelectorAll(".toggle input[data-col]").forEach(input => {
    input.addEventListener("change", () => {
      const col = input.dataset.col;
      activeCols[col] = input.checked;
      input.closest(".toggle").classList.toggle("active", input.checked);
      render();
      renderConverter();
    });
  });

  // range tabs
  rangeTabs.addEventListener("click", e => {
    const btn = e.target.closest("button");
    if(!btn) return;
    rangeTabs.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeRange = btn.dataset.range;
    render();
  });

  searchInput.addEventListener("input", render);

  const FACTORS_OF_128 = [1, 2, 4, 8, 16, 32, 64, 128];

  function nearestFactor(value){
    return FACTORS_OF_128.reduce((best, f) =>
      Math.abs(f - value) < Math.abs(best - value) ? f : best
    );
  }

  function nextFactorUp(value){
    return FACTORS_OF_128.find(f => f > value) ?? FACTORS_OF_128[FACTORS_OF_128.length - 1];
  }

  function nextFactorDown(value){
    return [...FACTORS_OF_128].reverse().find(f => f < value) ?? FACTORS_OF_128[0];
  }

  let prevRowsValue = ROWS_PER_BLOCK;

  rowsInput.addEventListener("input", () => {
    const raw = parseInt(rowsInput.value, 10);
    if(isNaN(raw)){
      return;
    }
    const diff = raw - prevRowsValue;
    let snapped;
    if(diff === 1){
      snapped = nextFactorUp(prevRowsValue);
    } else if(diff === -1){
      snapped = nextFactorDown(prevRowsValue);
    } else {
      snapped = nearestFactor(raw);
    }
    ROWS_PER_BLOCK = snapped;
    prevRowsValue = snapped;
    rowsInput.value = snapped;
    render();
  });

  render();
  renderConverter();
</script>
</body>
</html>
